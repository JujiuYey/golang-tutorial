<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Go安装步骤</title>
<style>
html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; display: flex; justify-content: center; align-items: center; background: #000; }
.slide-content { width: 960px; height: 540px; position: relative; transform-origin: center center; background: #03045e; }
</style>
<script>
function scaleSlide() {
  const slide = document.querySelector('.slide-content');
  if (!slide) return;
  const slideWidth = 960;
  const slideHeight = 540;
  const scaleX = window.innerWidth / slideWidth;
  const scaleY = window.innerHeight / slideHeight;
  const scale = Math.min(scaleX, scaleY);
  slide.style.width = slideWidth + 'px';
  slide.style.height = slideHeight + 'px';
  slide.style.transform = `scale(${scale})`;
  slide.style.transformOrigin = 'center center';
}
window.addEventListener('load', scaleSlide);
window.addEventListener('resize', scaleSlide);
</script>
</head>
<body>
<div class="slide-content">
  <p style="position:absolute; left:60px; top:30px; font-size:36px; font-weight:700; color:#ffffff; margin:0; font-family:'Times New Roman', serif;">Go安装步骤</p>
  <svg width="120" height="4" style="position:absolute; left:60px; top:80px;">
    <rect width="120" height="4" fill="#00b4d8"/>
  </svg>
  <div style="position:absolute; left:60px; top:110px; width:400px;">
    <p style="font-size:18px; color:#00b4d8; margin:0 0 10px 0; font-weight:700; font-family:'Times New Roman', serif;">Windows 安装</p>
    <p style="font-size:14px; color:#caf0f8; margin:0 0 5px 0; font-family:'Times New Roman', serif;">1. 下载: goinstaller.msi</p>
    <p style="font-size:14px; color:#caf0f8; margin:0 0 5px 0; font-family:'Times New Roman', serif;">2. 双击运行，一路Next</p>
    <p style="font-size:14px; color:#caf0f8; margin:0; font-family:'Times New Roman', serif;">3. 默认安装到 C:\Go</p>
  </div>
  <div style="position:absolute; left:500px; top:110px; width:400px;">
    <p style="font-size:18px; color:#00b4d8; margin:0 0 10px 0; font-weight:700; font-family:'Times New Roman', serif;">Mac 安装 (Homebrew)</p>
    <p style="font-size:14px; color:#caf0f8; margin:0 0 5px 0; font-family:'Times New Roman', serif;">brew install go</p>
    <p style="font-size:14px; color:#90e0ef; margin:0; font-family:'Times New Roman', serif;">自动配置环境变量</p>
  </div>
  <div style="position:absolute; left:60px; top:220px; width:840px;">
    <p style="font-size:18px; color:#00b4d8; margin:0 0 15px 0; font-weight:700; font-family:'Times New Roman', serif;">验证安装</p>
    <div style="background:#0077b6; padding:15px 20px; border-radius:8px;">
      <p style="font-size:14px; color:#90e0ef; margin:0; font-family:'Courier New', monospace;">go version</p>
      <p style="font-size:14px; color:#ffffff; margin:10px 0 0 0; font-family:'Courier New', monospace;">go version go1.22.0 windows/amd64</p>
    </div>
  </div>
  <div style="position:absolute; left:60px; top:360px; width:840px;">
    <p style="font-size:18px; color:#00b4d8; margin:0 0 15px 0; font-weight:700; font-family:'Times New Roman', serif;">环境变量配置</p>
    <div style="background:#0077b6; padding:15px 20px; border-radius:8px;">
      <p style="font-size:14px; color:#90e0ef; margin:0; font-family:'Courier New', monospace;">GOPATH=C:\Users\你的用户名\go</p>
      <p style="font-size:14px; color:#90e0ef; margin:10px 0 0 0; font-family:'Courier New', monospace;">PATH添加 %GOROOT%\bin 和 %GOPATH%\bin</p>
    </div>
  </div>
  <svg style="position:absolute; right:32px; bottom:24px;" width="36" height="36" viewBox="0 0 36 36">
    <circle cx="18" cy="18" r="18" fill="#00b4d8"/>
    <text x="18" y="18" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="600" fill="#ffffff">6</text>
  </svg>
</div>
</body>
</html>
