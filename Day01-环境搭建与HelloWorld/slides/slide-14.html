<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>今日练习</title>
<style>
html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; display: flex; justify-content: center; align-items: center; background: #000; }
.slide-content { width: 960px; height: 540px; position: relative; transform-origin: center center; background: #03045e; }
</style>
<script>
function scaleSlide() {
  const slide = document.querySelector('.slide-content');
  if (!slide) return;
  const slideWidth = 960;
  const slideHeight = 540;
  const scaleX = window.innerWidth / slideWidth;
  const scaleY = window.innerHeight / slideHeight;
  const scale = Math.min(scaleX, scaleY);
  slide.style.width = slideWidth + 'px';
  slide.style.height = slideHeight + 'px';
  slide.style.transform = `scale(${scale})`;
  slide.style.transformOrigin = 'center center';
}
window.addEventListener('load', scaleSlide);
window.addEventListener('resize', scaleSlide);
</script>
</head>
<body>
<div class="slide-content">
  <p style="position:absolute; left:60px; top:30px; font-size:36px; font-weight:700; color:#ffffff; margin:0; font-family:'Times New Roman', serif;">今日练习</p>
  <svg width="120" height="4" style="position:absolute; left:60px; top:80px;">
    <rect width="120" height="4" fill="#00b4d8"/>
  </svg>
  <div style="position:absolute; left:60px; top:110px; width:400px; height:120px; background:#0077b6; border-radius:12px; padding:15px;">
    <p style="font-size:16px; color:#00b4d8; margin:0 0 10px 0; font-weight:700; font-family:'Times New Roman', serif;">练习1: 环境验证</p>
    <p style="font-size:14px; color:#caf0f8; margin:0; font-family:'Times New Roman', serif;">✓ 运行 go version 确认安装成功</p>
    <p style="font-size:14px; color:#caf0f8; margin:8px 0 0 0; font-family:'Times New Roman', serif;">✓ 运行 go env 查看环境变量</p>
  </div>
  <div style="position:absolute; left:480px; top:110px; width:400px; height:120px; background:#0077b6; border-radius:12px; padding:15px;">
    <p style="font-size:16px; color:#00b4d8; margin:0 0 10px 0; font-weight:700; font-family:'Times New Roman', serif;">练习2: Hello World</p>
    <p style="font-size:14px; color:#caf0f8; margin:0; font-family:'Times New Roman', serif;">✓ 创建项目并运行 Hello World</p>
    <p style="font-size:14px; color:#caf0f8; margin:8px 0 0 0; font-family:'Times New Roman', serif;">✓ 修改输出内容为你的名字</p>
  </div>
  <div style="position:absolute; left:60px; top:260px; width:820px; height:120px; background:#00b4d8; border-radius:12px; padding:15px;">
    <p style="font-size:16px; color:#03045e; margin:0 0 10px 0; font-weight:700; font-family:'Times New Roman', serif;">练习3: Go Module 项目</p>
    <p style="font-size:14px; color:#03045e; margin:0; font-family:'Times New Roman', serif;">✓ 创建新项目: go mod init myapp</p>
    <p style="font-size:14px; color:#03045e; margin:8px 0 0 0; font-family:'Times New Roman', serif;">✓ 编写一个计算两数相加的程序</p>
  </div>
  <div style="position:absolute; left:60px; top:400px; width:820px; background:#001d3d; border-radius:12px; padding:15px;">
    <p style="font-size:16px; color:#00b4d8; margin:0 0 10px 0; font-weight:700; font-family:'Times New Roman', serif;">挑战题 (选做)</p>
    <p style="font-size:14px; color:#caf0f8; margin:0; font-family:'Times New Roman', serif;">编写一个摄氏度和华氏度转换的程序，使用 fmt.Scan() 接收用户输入</p>
  </div>
  <svg style="position:absolute; right:32px; bottom:24px;" width="36" height="36" viewBox="0 0 36 36">
    <circle cx="18" cy="18" r="18" fill="#00b4d8"/>
    <text x="18" y="18" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="600" fill="#ffffff">14</text>
  </svg>
</div>
</body>
</html>
