<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>今日总结</title>
<style>
html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; display: flex; justify-content: center; align-items: center; background: #000; }
.slide-content { width: 960px; height: 540px; position: relative; transform-origin: center center; background: #0077b6; }
</style>
<script>
function scaleSlide() {
  const slide = document.querySelector('.slide-content');
  if (!slide) return;
  const slideWidth = 960;
  const slideHeight = 540;
  const scaleX = window.innerWidth / slideWidth;
  const scaleY = window.innerHeight / slideHeight;
  const scale = Math.min(scaleX, scaleY);
  slide.style.width = slideWidth + 'px';
  slide.style.height = slideHeight + 'px';
  slide.style.transform = `scale(${scale})`;
  slide.style.transformOrigin = 'center center';
}
window.addEventListener('load', scaleSlide);
window.addEventListener('resize', scaleSlide);
</script>
</head>
<body>
<div class="slide-content">
  <svg width="100%" height="100%" style="position:absolute;top:0;left:0;opacity:0.1;pointer-events:none;">
    <defs>
      <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
        <circle cx="20" cy="20" r="2" fill="#ffffff"/>
      </pattern>
    </defs>
    <rect width="100%" height="100%" fill="url(#dots)"/>
  </svg>
  <p style="position:absolute; left:60px; top:50px; font-size:36px; font-weight:700; color:#ffffff; margin:0; font-family:'Times New Roman', serif;">今日总结</p>
  <svg width="120" height="4" style="position:absolute; left:60px; top:100px;">
    <rect width="120" height="4" fill="#ffffff"/>
  </svg>
  <div style="position:absolute; left:60px; top:130px; width:400px;">
    <p style="font-size:18px; color:#ffffff; margin:0 0 20px 0; font-weight:700; font-family:'Times New Roman', serif;">学习要点</p>
    <p style="font-size:14px; color:#caf0f8; margin:0 0 12px 0; font-family:'Times New Roman', serif;">✓ Go语言核心特点: 简洁、高效、并发原生</p>
    <p style="font-size:14px; color:#caf0f8; margin:0 0 12px 0; font-family:'Times New Roman', serif;">✓ 开发环境安装与配置</p>
    <p style="font-size:14px; color:#caf0f8; margin:0 0 12px 0; font-family:'Times New Roman', serif;">✓ 编写第一个Go程序</p>
    <p style="font-size:14px; color:#caf0f8; margin:0 0 12px 0; font-family:'Times New Roman', serif;">✓ Go Module 项目管理</p>
    <p style="font-size:14px; color:#caf0f8; margin:0; font-family:'Times New Roman', serif;">✓ 开发工具配置</p>
  </div>
  <div style="position:absolute; left:500px; top:130px; width:400px;">
    <p style="font-size:18px; color:#ffffff; margin:0 0 20px 0; font-weight:700; font-family:'Times New Roman', serif;">下一步</p>
    <div style="background:#03045e; padding:15px; border-radius:8px;">
      <p style="font-size:14px; color:#90e0ef; margin:0 0 10px 0; font-family:'Times New Roman', serif;">Day 2-3: 基础语法</p>
      <p style="font-size:14px; color:#caf0f8; margin:0; font-family:'Times New Roman', serif;">• 变量与数据类型</p>
      <p style="font-size:14px; color:#caf0f8; margin:0; font-family:'Times New Roman', serif;">• 运算符与表达式</p>

    </div>
  </div>
  <div style="position:absolute; left:60px; top:380px; width:840px; background:#00b4d8; border-radius:12px; padding:20px;">
    <p style="font-size:20px; color:#03045e; margin:0; font-weight:700; font-family:'Times New Roman', serif;">记住: 动手实践是最好的学习方式！</p>

  </div>

    <text x="18" y="18" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="600" fill="#ffffff">15</text>
  </svg>
</div>
</body>
</html>
