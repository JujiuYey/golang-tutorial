<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>目录</title>
<style>
html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; display: flex; justify-content: center; align-items: center; background: #000; }
.slide-content { width: 960px; height: 540px; position: relative; transform-origin: center center; background: #03045e; }
</style>
<script>
function scaleSlide() {
  const slide = document.querySelector('.slide-content');
  if (!slide) return;
  const slideWidth = 960;
  const slideHeight = 540;
  const scaleX = window.innerWidth / slideWidth;
  const scaleY = window.innerHeight / slideHeight;
  const scale = Math.min(scaleX, scaleY);
  slide.style.width = slideWidth + 'px';
  slide.style.height = slideHeight + 'px';
  slide.style.transform = `scale(${scale})`;
  slide.style.transformOrigin = 'center center';
}
window.addEventListener('load', scaleSlide);
window.addEventListener('resize', scaleSlide);
</script>
</head>
<body>
<div class="slide-content">
  <p style="position:absolute; left:60px; top:40px; font-size:36px; font-weight:700; color:#ffffff; margin:0; font-family:'Times New Roman', serif;">目录</p>
  <svg width="60" height="4" style="position:absolute; left:60px; top:90px;">
    <rect width="60" height="4" fill="#00b4d8"/>
  </svg>
  <div style="position:absolute; left:60px; top:130px; width:380px;">
    <p style="font-size:28px; color:#00b4d8; margin:0 0 20px 0; font-family:'Times New Roman', serif;">01</p>
    <p style="font-size:22px; color:#ffffff; margin:0 0 8px 0; font-family:'Times New Roman', serif;">Go语言简介</p>
    <p style="font-size:14px; color:#90e0ef; margin:0 0 30px 0; font-family:'Times New Roman', serif;">为什么学习Go？核心特点</p>
    <p style="font-size:28px; color:#00b4d8; margin:0 0 20px 0; font-family:'Times New Roman', serif;">02</p>
    <p style="font-size:22px; color:#ffffff; margin:0 0 8px 0; font-family:'Times New Roman', serif;">开发环境搭建</p>
    <p style="font-size:14px; color:#90e0ef; margin:0 0 30px 0; font-family:'Times New Roman', serif;">Windows/Mac/Linux安装</p>
    <p style="font-size:28px; color:#00b4d8; margin:0 0 20px 0; font-family:'Times New Roman', serif;">03</p>
    <p style="font-size:22px; color:#ffffff; margin:0 0 8px 0; font-family:'Times New Roman', serif;">Hello World</p>
    <p style="font-size:14px; color:#90e0ef; margin:0; font-family:'Times New Roman', serif;">第一个Go程序</p>
  </div>
  <div style="position:absolute; left:500px; top:130px; width:400px;">
    <p style="font-size:28px; color:#00b4d8; margin:0 0 20px 0; font-family:'Times New Roman', serif;">04</p>
    <p style="font-size:22px; color:#ffffff; margin:0 0 8px 0; font-family:'Times New Roman', serif;">Go Module</p>
    <p style="font-size:14px; color:#90e0ef; margin:0 0 30px 0; font-family:'Times New Roman', serif;">包管理与依赖</p>
    <p style="font-size:28px; color:#00b4d8; margin:0 0 20px 0; font-family:'Times New Roman', serif;">05</p>
    <p style="font-size:22px; color:#ffffff; margin:0 0 8px 0; font-family:'Times New Roman', serif;">开发工具</p>
    <p style="font-size:14px; color:#90e0ef; margin:0 0 30px 0; font-family:'Times New Roman', serif;">VS Code / GoLand</p>
    <p style="font-size:28px; color:#00b4d8; margin:0 0 20px 0; font-family:'Times New Roman', serif;">06</p>
    <p style="font-size:22px; color:#ffffff; margin:0 0 8px 0; font-family:'Times New Roman', serif;">练习作业</p>
    <p style="font-size:14px; color:#90e0ef; margin:0; font-family:'Times New Roman', serif;">动手实践</p>
  </div>
  <svg style="position:absolute; right:32px; bottom:24px;" width="36" height="36" viewBox="0 0 36 36">
    <circle cx="18" cy="18" r="18" fill="#00b4d8"/>
    <text x="18" y="18" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="600" fill="#ffffff">2</text>
  </svg>
</div>
</body>
</html>
