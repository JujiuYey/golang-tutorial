<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Go语言快速入门 - Day 1</title>
<style>
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  display: flex;
  justify-content: center;
  align-items: center;
  background: #000;
}
.slide-content {
  width: 960px;
  height: 540px;
  position: relative;
  transform-origin: center center;
  background: #03045e;
}
</style>
<script>
function scaleSlide() {
  const slide = document.querySelector('.slide-content');
  if (!slide) return;
  const slideWidth = 960;
  const slideHeight = 540;
  const scaleX = window.innerWidth / slideWidth;
  const scaleY = window.innerHeight / slideHeight;
  const scale = Math.min(scaleX, scaleY);
  slide.style.width = slideWidth + 'px';
  slide.style.height = slideHeight + 'px';
  slide.style.transform = `scale(${scale})`;
  slide.style.transformOrigin = 'center center';
  slide.style.flexShrink = '0';
}
window.addEventListener('load', scaleSlide);
window.addEventListener('resize', scaleSlide);
</script>
</head>
<body>
<div class="slide-content">
  <img src="imgs/cover.png" alt="Go语言" style="position:absolute; left:0; top:0; width:960px; height:540px; object-fit:cover; opacity:0.3;" />
  <svg width="100%" height="100%" style="position:absolute;top:0;left:0;opacity:0.1;pointer-events:none;">
    <defs>
      <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
        <circle cx="20" cy="20" r="2" fill="#90e0ef"/>
      </pattern>
    </defs>
    <rect width="100%" height="100%" fill="url(#dots)"/>
  </svg>
  <h1 style="position:absolute; left:60px; top:120px; width:840px; font-size:72px; font-weight:700; color:#ffffff; margin:0; line-height:1.2; font-family:'Times New Roman', serif;">Go语言快速入门</h1>
  <p style="position:absolute; left:60px; top:220px; width:840px; font-size:36px; color:#90e0ef; margin:0; font-family:'Times New Roman', serif;">Day 1: 环境搭建与Hello World</p>
  <svg width="120" height="4" style="position:absolute; left:60px; top:280px;">
    <rect width="120" height="4" fill="#00b4d8"/>
  </svg>
  <p style="position:absolute; left:60px; top:320px; width:840px; font-size:20px; color:#caf0f8; margin:0; font-family:'Times New Roman', serif;">Go Module · 环境配置 · 第一个程序</p>
  <p style="position:absolute; left:60px; top:480px; width:840px; font-size:16px; color:#90e0ef; margin:0; font-family:'Times New Roman', serif;">预计学习时长: 2小时</p>
</div>
</body>
</html>
