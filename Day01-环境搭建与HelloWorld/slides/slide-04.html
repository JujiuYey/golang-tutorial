<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Go语言核心特点</title>
<style>
html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; display: flex; justify-content: center; align-items: center; background: #000; }
.slide-content { width: 960px; height: 540px; position: relative; transform-origin: center center; background: #03045e; }
</style>
<script>
function scaleSlide() {
  const slide = document.querySelector('.slide-content');
  if (!slide) return;
  const slideWidth = 960;
  const slideHeight = 540;
  const scaleX = window.innerWidth / slideWidth;
  const scaleY = window.innerHeight / slideHeight;
  const scale = Math.min(scaleX, scaleY);
  slide.style.width = slideWidth + 'px';
  slide.style.height = slideHeight + 'px';
  slide.style.transform = `scale(${scale})`;
  slide.style.transformOrigin = 'center center';
}
window.addEventListener('load', scaleSlide);
window.addEventListener('resize', scaleSlide);
</script>
</head>
<body>
<div class="slide-content">
  <p style="position:absolute; left:60px; top:30px; font-size:36px; font-weight:700; color:#ffffff; margin:0; font-family:'Times New Roman', serif;">Go语言核心特点</p>
  <svg width="120" height="4" style="position:absolute; left:60px; top:80px;">

    <p style="font-size:48px; color:#ffffff; margin:20px 0 0 20px; font-family:'Times New Roman', serif;">🚀</p>
    <p style="font-size:18px; color:#ffffff; margin:10px 0 0 20px; font-weight:700; font-family:'Times New Roman', serif;">简洁高效</p>
    <p style="font-size:12px; color:#caf0f8; margin:8px 20px 0 20px; font-family:'Times New Roman', serif;">语法简单，学习曲线平缓</p>
  </div>
  <div style="position:absolute; left:330px; top:110px; width:250px; height:180px; background:#0077b6; border-radius:12px;">

  </div>
  <div style="position:absolute; left:60px; top:310px; width:250px; height:180px; background:#00b4d8; border-radius:12px;">

</div>
