<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>函数与错误处理 - Day 4-5</title>
<style>
html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; display: flex; justify-content: center; align-items: center; background: #000; }
.slide-content { width: 960px; height: 540px; position: relative; transform-origin: center center; background: #03045e; }
</style>
<script>
function scaleSlide() {
  const slide = document.querySelector('.slide-content');
  if (!slide) return;
  slide.style.width = '960px';
  slide.style.height = '540px';
  slide.style.transform = `scale(${Math.min(window.innerWidth/960, window.innerHeight/540)})`;
  slide.style.transformOrigin = 'center center';
}
window.addEventListener('load', scaleSlide);
window.addEventListener('resize', scaleSlide);
</script>
</head>
<body>
<div class="slide-content">
  <svg width="100%" height="100%" style="position:absolute;top:0;left:0;opacity:0.1;">
    <defs><pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse"><circle cx="20" cy="20" r="2" fill="#90e0ef"/></pattern></defs>
    <rect width="100%" height="100%" fill="url(#dots)"/>
  </svg>
  <h1 style="position:absolute; left:60px; top:120px; width:840px; font-size:56px; font-weight:700; color:#ffffff; margin:0;">函数与错误处理</h1>
  <p style="position:absolute; left:60px; top:220px; width:840px; font-size:28px; color:#90e0ef; margin:0;">Day 4-5: 函数定义、参数、返回值、defer、panic/recover</p>
  <svg width="120" height="4" style="position:absolute; left:60px; top:280px;"><rect width="120" height="4" fill="#00b4d8"/></svg>
  <p style="position:absolute; left:60px; top:320px; width:840px; font-size:16px; color:#caf0f8; margin:0;">预计学习时长: 4小时</p>
</div>
</body>
</html>
