<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>练习作业</title>
<style>
html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; display: flex; justify-content: center; align-items: center; background: #000; }
.slide-content { width: 960px; height: 540px; position: relative; transform-origin: center center; background: #03045e; }
</style>
<script>
function scaleSlide() {
  const slide = document.querySelector('.slide-content');
  if (!slide) return;
  slide.style.width = '960px';
  slide.style.height = '540px';
  slide.style.transform = `scale(${Math.min(window.innerWidth/960, window.innerHeight/540)})`;
  slide.style.transformOrigin = 'center center';
}
window.addEventListener('load', scaleSlide);
window.addEventListener('resize', scaleSlide);
</script>
</head>
<body>
<div class="slide-content">
  <p style="position:absolute; left:60px; top:30px; font-size:32px; font-weight:700; color:#ffffff; margin:0;">练习作业</p>
  <svg width="100" height="4" style="position:absolute; left:60px; top:75px;"><rect width="100" height="4" fill="#00b4d8"/></svg>
  <div style="position:absolute; left:60px; top:100px; width:400px; height:180px; background:#0077b6; border-radius:12px; padding:15px;">
    <p style="font-size:16px; color:#00b4d8; margin:0 0 10px 0; font-weight:700;">练习1: 猜数字游戏</p>
    <p style="font-size:13px; color:#caf0f8; margin:0;">1. 生成1-100随机数</p>
    <p style="font-size:13px; color:#caf0f8; margin:8px 0 0 0;">2. 用户输入猜测</p>
    <p style="font-size:13px; color:#caf0f8; margin:8px 0 0 0;">3. 提示大了/小了</p>
    <p style="font-size:13px; color:#caf0f8; margin:8px 0 0 0;">4. 直到猜对为止</p>
  </div>
  <div style="position:absolute; left:500px; top:100px; width:400px; height:180px; background:#0077b6; border-radius:12px; padding:15px;">
    <p style="font-size:16px; color:#00b4d8; margin:0 0 10px 0; font-weight:700;">练习2: 九九乘法表</p>
    <p style="font-size:13px; color:#caf0f8; margin:0;">使用for循环打印:</p>
    <p style="font-size:13px; color:#90e0ef; margin:8px 0 0 0; font-family:'Courier New', monospace;">1x1=1</p>
    <p style="font-size:13px; color:#90e0ef; margin:4px 0 0 0; font-family:'Courier New', monospace;">1x2=2 2x2=4</p>
    <p style="font-size:13px; color:#90e0ef; margin:4px 0 0 0; font-family:'Courier New', monospace;">...</p>
  </div>
  <div style="position:absolute; left:60px; top:300px; width:840px; height:180px; background:#00b4d8; border-radius:12px; padding:15px;">
    <p style="font-size:16px; color:#03045e; margin:0 0 10px 0; font-weight:700;">挑战题: 计算器</p>
    <p style="font-size:13px; color:#03045e; margin:0;">实现一个简易计算器，支持 + - * / 四种运算</p>
    <p style="font-size:13px; color:#03045e; margin:8px 0 0 0;">使用switch根据运算符选择计算逻辑</p>
    <div style="background:#03045e; padding:10px; border-radius:6px; margin-top:10px;">
      <p style="font-size:12px; color:#90e0ef; margin:0; font-family:'Courier New', monospace;">请输入: 10 + 5</p>
      <p style="font-size:12px; color:#90e0ef; margin:4px 0 0 0; font-family:'Courier New', monospace;">结果: 15</p>
    </div>
  </div>
  <svg style="position:absolute; right:32px; bottom:24px;" width="36" height="36" viewBox="0 0 36 36">
    <circle cx="18" cy="18" r="18" fill="#00b4d8"/>
    <text x="18" y="18" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="600" fill="#ffffff">6</text>
  </svg>
</div>
</body>
</html>
