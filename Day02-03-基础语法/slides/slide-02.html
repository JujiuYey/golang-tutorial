<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>目录</title>
<style>
html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; display: flex; justify-content: center; align-items: center; background: #000; }
.slide-content { width: 960px; height: 540px; position: relative; transform-origin: center center; background: #03045e; }
</style>
<script>
function scaleSlide() {
  const slide = document.querySelector('.slide-content');
  if (!slide) return;
  slide.style.width = '960px';
  slide.style.height = '540px';
  slide.style.transform = `scale(${Math.min(window.innerWidth/960, window.innerHeight/540)})`;
  slide.style.transformOrigin = 'center center';
}
window.addEventListener('load', scaleSlide);
window.addEventListener('resize', scaleSlide);
</script>
</head>
<body>
<div class="slide-content">
  <p style="position:absolute; left:60px; top:40px; font-size:36px; font-weight:700; color:#ffffff; margin:0; font-family:'Times New Roman', serif;">目录</p>
  <svg width="60" height="4" style="position:absolute; left:60px; top:90px;"><rect width="60" height="4" fill="#00b4d8"/></svg>
  <div style="position:absolute; left:60px; top:130px; width:400px;">
    <p style="font-size:24px; color:#00b4d8; margin:0 0 15px 0;">01 变量与常量</p>
    <p style="font-size:24px; color:#00b4d8; margin:0 0 15px 0;">02 数据类型</p>
    <p style="font-size:24px; color:#00b4d8; margin:0;">03 运算符</p>
  </div>
  <div style="position:absolute; left:500px; top:130px; width:400px;">
    <p style="font-size:24px; color:#00b4d8; margin:0 0 15px 0;">04 流程控制</p>
    <p style="font-size:24px; color:#00b4d8; margin:0 0 15px 0;">05 练习作业</p>
  </div>
  <svg style="position:absolute; right:32px; bottom:24px;" width="36" height="36" viewBox="0 0 36 36">
    <circle cx="18" cy="18" r="18" fill="#00b4d8"/>
    <text x="18" y="18" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="600" fill="#ffffff">2</text>
  </svg>
</div>
</body>
</html>
